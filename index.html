<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>手牌盈利台账</title>
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icon-192.png">
<link rel="apple-touch-icon" href="/icon-180.png">
<meta name="theme-color" content="#0E2A22">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="手牌台账">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');
  :root{--felt:#0E2A22; --felt-deep:#081C17; --felt-line:#1B4438; --cream:#F4EEDD; --cream-dim:#C9C0A6; --gold:#C9A24B; --gold-soft:#8A742F; --wine:#9A4B44; --wine-soft:#5C2E2A; --card:#141C19; --loss:#D98F86;}
  *{box-sizing:border-box; font-family:'Inter',sans-serif;}
  body{margin:0; background:radial-gradient(ellipse at top, var(--felt), var(--felt-deep)); min-height:100vh; color:var(--cream); padding-bottom:40px;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  .serif{font-family:'Fraunces',serif;}
  .wrap{max-width:520px; margin:0 auto; padding:24px 16px 0;}
  h1{font-size:26px; font-weight:700; margin:0;}
  .sub{font-size:12px; color:var(--cream-dim); margin:4px 0 20px;}
  .header-row{display:flex; align-items:center; gap:8px; margin-bottom:2px;}
  .summary{background:var(--card); border:1px solid var(--felt-line); border-radius:14px; padding:18px 20px; margin-bottom:20px; display:flex; align-items:flex-end; justify-content:space-between;}
  .summary .label{font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--cream-dim);}
  .summary .value{font-size:30px; margin-top:4px;}
  .summary .meta{font-size:13px; color:var(--cream-dim); display:flex; align-items:center; gap:5px;}
  .row-add{display:flex; gap:8px; margin-bottom:12px;}
  input, textarea{background:var(--card); color:var(--cream); border:1px solid var(--felt-line); border-radius:8px; padding:9px 12px; font-size:14px; outline:none; width:100%;}
  input::placeholder, textarea::placeholder{color:var(--cream-dim); opacity:.7;}
  .btn-gold{background:var(--gold); color:var(--felt-deep); border:none; border-radius:8px; padding:0 14px; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center;}
  .btn-gold:active{transform:scale(0.95);}
  .sort-row{display:flex; gap:10px; margin-bottom:16px; font-size:12px;}
  .sort-btn{padding:5px 10px; border-radius:6px; background:transparent; color:var(--cream-dim); border:none; cursor:pointer;}
  .sort-btn.active{background:var(--gold); color:var(--felt-deep);}
  .grid{display:grid; grid-template-columns:1fr 1fr; gap:8px;}
  .tile{background:var(--card); border-radius:10px; padding:12px; text-align:left; cursor:pointer; transition:transform .1s;}
  .tile:active{transform:scale(0.96);}
  .tile-top{display:flex; align-items:center; justify-content:space-between;}
  .tile-rank{font-size:10px; opacity:.5; color:var(--cream-dim); font-family:'IBM Plex Mono',monospace; margin-right:6px;}
  .tile-name{font-weight:600; letter-spacing:.02em; color:var(--gold);}
  .tile-total{font-size:19px; margin-top:4px; font-family:'IBM Plex Mono',monospace;}
  .tile-count{font-size:10px; color:var(--cream-dim); margin-top:2px;}
  .footer-actions{margin-top:32px; display:flex; justify-content:center;}
  .link-btn{background:none; border:none; color:var(--cream-dim); font-size:12px; cursor:pointer; display:flex; align-items:center; gap:4px;}
  .reset-confirm{font-size:12px; color:var(--cream-dim); display:flex; align-items:center; gap:8px;}
  .reset-confirm button{background:none; border:none; cursor:pointer; font-size:12px;}
  .reset-confirm .yes{color:var(--wine);}
  .reset-confirm .no{color:var(--cream-dim);}
  .overlay{position:fixed; inset:0; background:rgba(4,10,8,0.7); display:flex; align-items:flex-end; justify-content:center; z-index:50;}
  @media(min-width:640px){ .overlay{align-items:center;} }
  .sheet{width:100%; max-width:460px; max-height:85vh; background:var(--felt-deep); border:1px solid var(--felt-line); display:flex; flex-direction:column; border-radius:18px 18px 0 0;}
  @media(min-width:640px){ .sheet{border-radius:14px;} }
  .sheet-head{padding:16px; display:flex; align-items:flex-start; justify-content:space-between; border-bottom:1px solid var(--felt-line);}
  .sheet-total{font-size:26px; margin-top:6px; font-family:'IBM Plex Mono',monospace;}
  .close-btn{background:none; border:none; color:var(--cream-dim); cursor:pointer;}
  .sheet-body{padding:16px; overflow-y:auto; flex:1;}
  .entry-row-input{display:flex; gap:8px; margin-bottom:10px;}
  .entry-row-input input:nth-child(1){flex:1;}
  .entry-row-input input:nth-child(2){width:96px;}
  .import-toggle{font-size:12px; color:var(--cream-dim); background:none; border:none; cursor:pointer; display:flex; align-items:center; gap:5px; padding:0 0 10px;}
  .import-box{margin-bottom:12px;}
  .import-box textarea{margin-bottom:8px; font-family:'IBM Plex Mono',monospace; font-size:12px;}
  .import-box button{background:var(--gold-soft); color:var(--cream); border:none; border-radius:6px; padding:6px 12px; font-size:12px; cursor:pointer;}
  .divider{display:flex; align-items:center; gap:8px; opacity:.4; margin:14px 0;}
  .divider .line{height:1px; flex:1; background:var(--gold-soft);}
  .entries-empty{text-align:center; padding:24px 0; font-size:13px; color:var(--cream-dim);}
  .entry-item{display:flex; align-items:center; justify-content:space-between; font-size:14px; padding:7px 6px; border-bottom:1px solid var(--felt-line);}
  .entry-amt{font-family:'IBM Plex Mono',monospace;}
  .entry-note{flex:1; margin:0 8px; font-size:11px; color:var(--cream-dim); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .entry-date{font-size:10px; color:var(--cream-dim); opacity:.6; font-family:'IBM Plex Mono',monospace; white-space:nowrap; margin-right:8px;}
  .entry-del{background:none; border:none; color:var(--cream-dim); cursor:pointer;}
  .sheet-foot{padding:12px 16px; border-top:1px solid var(--felt-line);}
  .delete-hand-btn{width:100%; text-align:center; background:none; border:none; color:var(--wine); font-size:12px; padding:6px; cursor:pointer;}
  .gold{color:var(--gold);}
  .loss{color:var(--loss);}
  .hidden{display:none !important;}
  .toast{position:fixed; left:50%; bottom:24px; transform:translateX(-50%); max-width:90vw; background:var(--card); border:1px solid var(--felt-line); border-radius:10px; padding:10px 16px; display:flex; align-items:center; gap:16px; font-size:13px; color:var(--cream); box-shadow:0 6px 24px rgba(0,0,0,.4); z-index:100;}
  .toast .undo-btn{background:none; border:none; color:var(--gold); font-weight:600; cursor:pointer; font-size:13px; white-space:nowrap;}
  .toast .toast-close{background:none; border:none; color:var(--cream-dim); cursor:pointer; font-size:16px; line-height:1; padding:0;}
</style>
</head>
<body>
<div class="wrap">
  <div class="header-row">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#C9A24B" stroke-width="2"><path d="M12 2C7 7 3 10 3 14a5 5 0 0 0 8.5 3.5c.4.7.5 1.5.5 2.5H10v2h4v-2h-2c0-1 .1-1.8.5-2.5A5 5 0 0 0 21 14c0-4-4-7-9-12z"/></svg>
    <h1 class="serif">手牌盈利台账</h1>
  </div>
  <p class="sub">按起手牌分类记录每一局的输赢，自动累计总盈亏</p>

  <div class="summary">
    <div>
      <div class="label">总盈亏</div>
      <div class="value mono" id="grandTotal">+0</div>
    </div>
    <div class="meta" id="metaInfo">0 种手牌 · 0 局</div>
  </div>

  <div class="row-add">
    <input id="newHandInput" placeholder="新增手牌类别，如 QJo">
    <button class="btn-gold" onclick="addHand()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg></button>
  </div>

  <div style="margin-bottom:12px;">
    <input id="searchInput" placeholder="搜索手牌，如 AA、AK、QQ" style="width:100%;" oninput="updateSearch()">
  </div>

  <div class="sort-row" id="sortRow">
    <button class="sort-btn active" data-sort="profit" onclick="setSort('profit')">按盈亏</button>
    <button class="sort-btn" data-sort="name" onclick="setSort('name')">按名称</button>
    <button class="sort-btn" data-sort="count" onclick="setSort('count')">按局数</button>
  </div>

  <div class="grid" id="handGrid"></div>

  <div class="footer-actions" id="footerActions">
    <button class="link-btn" onclick="showResetConfirm()">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 3-6.7M3 4v5h5"/></svg>
      重新导入初始历史数据
    </button>
  </div>
</div>

<div class="overlay hidden" id="overlay" onclick="closeSheetOutside(event)">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-head">
      <div>
        <div class="serif" style="font-size:20px;" id="sheetName"></div>
        <div class="sheet-total mono" id="sheetTotal"></div>
      </div>
      <button class="close-btn" onclick="closeSheet()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="sheet-body">
      <div class="entry-row-input">
        <input id="amountInput" placeholder="+120 或 -80">
        <input id="noteInput" placeholder="备注(可选)">
        <button class="btn-gold" onclick="submitEntry()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
        </button>
      </div>

      <button class="import-toggle" onclick="toggleImport()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12m0 0 4-4m-4 4-4-4M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>
        粘贴一段记录自动拆分（如 +230-25=205-40=165）
      </button>
      <div class="import-box hidden" id="importBox">
        <textarea id="chainInput" rows="3" placeholder="粘贴类似 +230-25=205-40=165 的记录链"></textarea>
        <button onclick="submitImport()" id="importBtn">解析并导入</button>
      </div>

      <div class="divider"><div class="line"></div><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#C9A24B" stroke-width="2"><path d="M12 2C7 7 3 10 3 14a5 5 0 0 0 8.5 3.5c.4.7.5 1.5.5 2.5H10v2h4v-2h-2c0-1 .1-1.8.5-2.5A5 5 0 0 0 21 14c0-4-4-7-9-12z"/></svg><div class="line"></div></div>

      <div id="entriesList"></div>
    </div>
    <div class="sheet-foot">
      <button class="delete-hand-btn" onclick="deleteCurrentHand()">删除这个手牌类别</button>
    </div>
  </div>
</div>

<div class="toast hidden" id="toast">
  <span id="toastMsg"></span>
  <button class="undo-btn" id="toastUndoBtn">撤销</button>
  <button class="toast-close" id="toastCloseBtn">&times;</button>
</div>

function parseChain(raw) {
  const s = (raw || "").replace(/\s+/g, "");
  if (!s) return [];
  const parts = s.split("=");
  const out = [];
  const signedRe = /[+-]\d+(?:\.\d+)?/g;
  
  let firstChunk = parts[0];
  const unsignedDashMatch = firstChunk.match(/^(\d+(?:\.\d+)?)-([\d.]+)$/);
  const nextChunkHasSigned = parts.length > 1 && parts[1].match(/^[+-]/);
  
  if (unsignedDashMatch && nextChunkHasSigned) {
    firstChunk = "";
  } else {
    const unsignedMatch = firstChunk.match(/^\d+(?:\.\d+)?/);
    if (unsignedMatch) {
      out.push(Number(unsignedMatch[0]));
      firstChunk = firstChunk.slice(unsignedMatch[0].length);
    }
  }
  
  const firstSigned = firstChunk.match(signedRe) || [];
  out.push(...firstSigned.map(Number));
  
  for (let i = 1; i < parts.length; i++) {
    let chunk = parts[i];
    if (!chunk) continue;
    const totalMatch = chunk.match(/^-?\d+(?:\.\d+)?/);
    if (totalMatch) chunk = chunk.slice(totalMatch[0].length);
    const incs = chunk.match(signedRe) || [];
    out.push(...incs.map(Number));
  }
  return out;
}

const SKIP_HEADERS = ["AX系列", "小KX", "QX", "JX", "结构牌"];

function splitIntoHands(rawText) {
  const lines = rawText.split("\n").map((l) => l.trim());
  const hands = {};
  let current = null;
  const order = [];
  const ensure = (name) => {
    if (!hands[name]) { hands[name] = []; order.push(name); }
    return hands[name];
  };
  
  for (let line of lines) {
    if (!line) continue;
    if (/^-{2,}$/.test(line)) { current = null; continue; }
    if (SKIP_HEADERS.includes(line)) { current = null; continue; }
    if (/^Bomb\s*pot/i.test(line)) { current = "Bomb pot"; ensure(current).push(line.replace(/^Bomb\s*pot[一共]*/i, "")); continue; }
    
    if (/^[2-9TJQKA]{2}(?:[so])?$/.test(line)) {
      current = line;
      ensure(current);
      continue;
    }
    
    const m = line.match(/^([2-9TJQKA]{2}(?:[so])?)(?![0-9-])/);
    if (m) { current = m[1]; ensure(current).push(line.slice(m[0].length)); continue; }
    
    if (current) ensure(current).push(line);
  }
  
  const result = {};
  for (const name of order) result[name] = parseChain(hands[name].join("="));
  return result;
}

function buildInitialHands() {
  const parsed = splitIntoHands(RAW_IMPORT);
  const hands = {};
  let seq = 0;
  for (const [name, increments] of Object.entries(parsed)) {
    if (!increments.length) continue;
    hands[name] = { name, entries: increments.map((amt) => ({ id: `seed-${seq++}`, amount: amt, note: "历史导入", date: null })) };
  }
  return hands;
}

const STORE_KEY = "poker-hand-profits-v2";
const AUTH_KEY = "poker-auth-token";
const API_URL = "/api/hands";

function getAuthToken() {
  let t = localStorage.getItem(AUTH_KEY);
  if (!t) {
    t = prompt("请输入写入密码：") || "";
    if (t) localStorage.setItem(AUTH_KEY, t);
  }
  return t;
}

async function loadHands() {
  try {
    const res = await fetch(API_URL, { method: "GET" });
    if (res.ok) {
      const data = await res.json();
      if (data && Object.keys(data).length > 0) return data;
    } else {
      console.error("load failed, status", res.status);
    }
  } catch (e) { console.error("load failed", e); }
  try { const raw = localStorage.getItem(STORE_KEY); if (raw) return JSON.parse(raw); }
  catch (e) {}
  return null;
}
async function saveHands(hands) {
  try {
    const token = getAuthToken();
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json", Authorization: "Bearer " + token },
      body: JSON.stringify(hands),
    });
    if (res.status === 401) {
      localStorage.removeItem(AUTH_KEY);
      console.error("save failed, wrong password");
      return false;
    }
    if (!res.ok) {
      console.error("save failed, status", res.status);
      return false;
    }
    return true;
  } catch (e) {
    console.error("save failed", e);
    return false;
  }
}

let hands = null, selected = null, sortMode = "profit", searchTerm = "";
const fmt = (n) => { const r = Math.round(n); return (r >= 0 ? "+" : "") + r.toLocaleString("zh-CN"); };
const total = (h) => h.entries.reduce((s, e) => s + e.amount, 0);
const fmtDate = (iso) => {
  if (!iso) return "";
  const d = new Date(iso);
  const p = (n) => String(n).padStart(2, "0");
  return `${p(d.getMonth() + 1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
};

async function init() {
  const stored = await loadHands();
  if (stored && Object.keys(stored).length > 0) hands = stored;
  else { hands = buildInitialHands(); await saveHands(hands); }
  render();
}

async function persist() { return await saveHands(hands); }

function getSortedList() {
  let arr = Object.values(hands);
  if (sortMode === "profit") arr = arr.slice().sort((a, b) => total(b) - total(a));
  else if (sortMode === "name") arr = arr.slice().sort((a, b) => a.name.localeCompare(b.name));
  else arr = arr.slice().sort((a, b) => b.entries.length - a.entries.length);
  return arr;
}

function handMatchesSearch(name, term) {
  if (name.toLowerCase().includes(term)) return true;
  const m = name.match(/^([2-9TJQKA])([2-9TJQKA])([so])?$/);
  if (m) {
    const swapped = (m[2] + m[1] + (m[3] || "")).toLowerCase();
    if (swapped.includes(term)) return true;
  }
  return false;
}

function getFilteredList() {
  const sorted = getSortedList();
  if (!searchTerm.trim()) return sorted;
  const term = searchTerm.trim().toLowerCase();
  return sorted.filter(h => handMatchesSearch(h.name, term));
}

function updateSearch() {
  searchTerm = document.getElementById("searchInput").value;
  render();
}

function render() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(hands)); } catch (e) {}
  const list = getFilteredList();
  const grand = Object.values(hands).reduce((s, h) => s + total(h), 0);
  const totalHands = Object.values(hands).reduce((s, h) => s + h.entries.length, 0);

  const gt = document.getElementById("grandTotal");
  gt.textContent = fmt(grand);
  gt.className = "value mono " + (grand >= 0 ? "gold" : "loss");
  document.getElementById("metaInfo").textContent = `${Object.keys(hands).length} 种手牌 · ${totalHands} 局`;

  const grid = document.getElementById("handGrid");
  grid.innerHTML = "";
  
  if (list.length === 0 && searchTerm.trim()) {
    grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:30px 0; color:var(--cream-dim); font-size:13px;">未找到匹配的手牌</div>`;
    return;
  }
  
  list.forEach((h, i) => {
    const t = total(h);
    const positive = t >= 0;
    const tile = document.createElement("button");
    tile.className = "tile";
    tile.style.border = `1px solid ${positive ? "#8A742F" : "#5C2E2A"}`;
    tile.onclick = () => openSheet(h.name);
    tile.innerHTML = `
      <div class="tile-top">
        <div><span class="tile-rank">${String(i + 1).padStart(2, "0")}</span><span class="tile-name serif">${h.name}</span></div>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#C9C0A6" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
      </div>
      <div class="tile-total ${positive ? 'gold' : 'loss'}">${fmt(t)}</div>
      <div class="tile-count">${h.entries.length} 局记录</div>
    `;
    grid.appendChild(tile);
  });

  document.querySelectorAll(".sort-btn").forEach(b => {
    b.classList.toggle("active", b.dataset.sort === sortMode);
  });

  if (selected && hands[selected]) renderSheet();
}

function setSort(mode) { sortMode = mode; render(); }
async function addHand() {
  const input = document.getElementById("newHandInput");
  const name = input.value.trim();
  if (!name || hands[name]) return;
  hands[name] = { name, entries: [] };
  input.value = "";
  render();
  const ok = await persist();
  if (!ok) {
    delete hands[name];
    render();
    alert("没有保存成功（密码错误或取消），这个手牌类别没有真正创建");
    return;
  }
  openSheet(name);
}

function openSheet(name) {
  selected = name;
  document.getElementById("overlay").classList.remove("hidden");
  document.getElementById("importBox").classList.add("hidden");
  document.getElementById("amountInput").value = "";
  document.getElementById("noteInput").value = "";
  document.getElementById("chainInput").value = "";
  renderSheet();
}
function closeSheet() { selected = null; document.getElementById("overlay").classList.add("hidden"); }
function closeSheetOutside(e) { if (e.target.id === "overlay") closeSheet(); }

function renderSheet() {
  const h = hands[selected];
  if (!h) return;
  const t = total(h);
  document.getElementById("sheetName").textContent = h.name;
  const st = document.getElementById("sheetTotal");
  st.textContent = fmt(t);
  st.className = "sheet-total mono " + (t >= 0 ? "gold" : "loss");

  const list = document.getElementById("entriesList");
  if (h.entries.length === 0) { list.innerHTML = `<div class="entries-empty">还没有记录，先加一条吧</div>`; return; }
  list.innerHTML = "";
  h.entries.slice().reverse().forEach((e) => {
    const row = document.createElement("div");
    row.className = "entry-item";
    row.innerHTML = `
      <span class="entry-amt ${e.amount >= 0 ? 'gold' : 'loss'}">${fmt(e.amount)}</span>
      <span class="entry-note">${e.note || ""}</span>
      <span class="entry-date">${fmtDate(e.date)}</span>
      <button class="entry-del" onclick="deleteEntry('${e.id}')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m2 0v14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V6h12z"/></svg>
      </button>
    `;
    list.appendChild(row);
  });
}

async function submitEntry() {
  const amountInput = document.getElementById("amountInput");
  const noteInput = document.getElementById("noteInput");
  const n = parseFloat(amountInput.value);
  if (isNaN(n) || n === 0) return;
  const h = hands[selected];
  const entry = { id: `e-${Date.now()}-${Math.random().toString(36).slice(2,7)}`, amount: n, note: noteInput.value, date: new Date().toISOString() };
  h.entries.push(entry);
  amountInput.value = ""; noteInput.value = "";
  render();
  const ok = await persist();
  if (!ok) {
    h.entries = h.entries.filter(e => e.id !== entry.id);
    render();
    alert("保存失败（密码错误或取消），这条记录没有真正保存");
  }
}

function toggleImport() { document.getElementById("importBox").classList.toggle("hidden"); }

async function submitImport() {
  const chainInput = document.getElementById("chainInput");
  const incs = parseChain(chainInput.value);
  if (!incs.length) return;
  const h = hands[selected];
  const newEntries = incs.map((amt, i) => ({ id: `e-${Date.now()}-${i}-${Math.random().toString(36).slice(2,5)}`, amount: amt, note: "批量导入", date: new Date().toISOString() }));
  h.entries.push(...newEntries);
  chainInput.value = "";
  document.getElementById("importBox").classList.add("hidden");
  render();
  const ok = await persist();
  if (!ok) {
    const ids = new Set(newEntries.map(e => e.id));
    h.entries = h.entries.filter(e => !ids.has(e.id));
    render();
    alert("保存失败（密码错误或取消），这些记录没有真正保存");
  }
}

let toastUndoAction = null;

function showUndoToast(message, undoFn) {
  toastUndoAction = undoFn;
  document.getElementById("toastMsg").textContent = message;
  document.getElementById("toast").classList.remove("hidden");
}
function hideToast() {
  document.getElementById("toast").classList.add("hidden");
  toastUndoAction = null;
}
document.getElementById("toastCloseBtn").addEventListener("click", hideToast);
document.getElementById("toastUndoBtn").addEventListener("click", async () => {
  const fn = toastUndoAction;
  hideToast();
  if (fn) await fn();
});

async function deleteEntry(id) {
  const h = hands[selected];
  const idx = h.entries.findIndex(e => e.id === id);
  if (idx === -1) return;
  const [removed] = h.entries.splice(idx, 1);
  const handName = h.name;
  render();
  const ok = await persist();
  if (!ok) {
    h.entries.splice(idx, 0, removed);
    render();
    alert("删除失败（密码错误或取消），记录已恢复");
    return;
  }
  showUndoToast(`已删除 ${fmt(removed.amount)} 的记录`, async () => {
    const hh = hands[handName];
    if (!hh) return;
    hh.entries.splice(idx, 0, removed);
    render();
    const ok2 = await persist();
    if (!ok2) {
      hh.entries = hh.entries.filter(e => e.id !== removed.id);
      render();
      alert("撤销失败（密码错误或取消）");
    }
  });
}

async function deleteCurrentHand() {
  const name = selected;
  const backup = hands[name];
  delete hands[name];
  selected = null;
  closeSheet();
  render();
  const ok = await persist();
  if (!ok) {
    hands[name] = backup;
    render();
    alert("删除失败（密码错误或取消），这个手牌类别已恢复");
    return;
  }
  showUndoToast(`已删除手牌 ${name}`, async () => {
    hands[name] = backup;
    render();
    const ok2 = await persist();
    if (!ok2) {
      delete hands[name];
      render();
      alert("撤销失败（密码错误或取消）");
    }
  });
}

function showResetConfirm() {
  const el = document.getElementById("footerActions");
  el.innerHTML = `
    <div class="reset-confirm">
      这会清空当前所有记录，确定？
      <button class="yes" onclick="resetAll()">确定</button>
      <button class="no" onclick="cancelReset()">取消</button>
    </div>
  `;
}
function cancelReset() {
  const el = document.getElementById("footerActions");
  el.innerHTML = `
    <button class="link-btn" onclick="showResetConfirm()">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 3-6.7M3 4v5h5"/></svg>
      重新导入初始历史数据
    </button>
  `;
}
async function resetAll() {
  const backup = hands;
  hands = buildInitialHands();
  cancelReset();
  render();
  const ok = await persist();
  if (!ok) {
    hands = backup;
    render();
    alert("重新导入失败（密码错误或取消），数据已恢复");
  }
}

document.getElementById("newHandInput").addEventListener("keydown", (e) => { if (e.key === "Enter") addHand(); });

init();
</script>
